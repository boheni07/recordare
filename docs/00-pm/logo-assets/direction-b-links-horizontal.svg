<svg width="420" height="130" viewBox="0 0 420 130" xmlns="http://www.w3.org/2000/svg">
  <title>Recordare — Direction B: 연결 고리 성장 (가로형)</title>

  <!-- Symbol: Growing circles connected by line -->
  <g transform="translate(10, 12)">

    <!-- Connecting line -->
    <line x1="14" y1="55" x2="98" y2="55" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Circle 1: smallest (영유아기) — coral outline -->
    <circle cx="14" cy="55" r="10" fill="#F5F0E8" stroke="#E07A5F" stroke-width="2.5"/>

    <!-- Circle 2 (학령기) -->
    <circle cx="36" cy="55" r="15" fill="#F5F0E8" stroke="#2D6A4F" stroke-width="2.5"/>

    <!-- Circle 3 (전환기) -->
    <circle cx="64" cy="55" r="21" fill="#F0F7F4" stroke="#2D6A4F" stroke-width="2.5"/>

    <!-- Circle 4: largest (성인기 자립) — filled -->
    <circle cx="98" cy="55" r="28" fill="#2D6A4F"/>
    <!-- Inner accent dot on circle 4 -->
    <circle cx="98" cy="55" r="10" fill="#E07A5F"/>

    <!-- Growth labels (small) -->
    <text x="14"  y="76" font-family="Arial, sans-serif" font-size="7" fill="#888" text-anchor="middle">영유아</text>
    <text x="36"  y="80" font-family="Arial, sans-serif" font-size="7" fill="#888" text-anchor="middle">학령기</text>
    <text x="64"  y="86" font-family="Arial, sans-serif" font-size="7" fill="#888" text-anchor="middle">전환기</text>
    <text x="98"  y="93" font-family="Arial, sans-serif" font-size="7" fill="#2D6A4F" text-anchor="middle" font-weight="bold">성인기</text>
  </g>

  <!-- Thin divider -->
  <line x1="138" y1="18" x2="138" y2="112" stroke="#D8D8D8" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="154" y="62" font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="bold" fill="#2D2D2D" letter-spacing="-0.5">Recordare</text>
  <text x="155" y="84" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" fill="#2D6A4F" letter-spacing="5">레 코 다 레</text>
  <text x="155" y="104" font-family="Georgia, 'Times New Roman', serif"
        font-size="9.5" fill="#888888" font-style="italic" letter-spacing="0.5">당신의 삶, 단 하나의 기억으로</text>
</svg>
