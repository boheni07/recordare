<svg width="420" height="130" viewBox="0 0 420 130" xmlns="http://www.w3.org/2000/svg">
  <title>Recordare — Direction C: R 이니셜 + 심장 (가로형)</title>

  <!-- Symbol: Geometric R with integrated heart -->
  <g transform="translate(10, 10)">

    <!-- R: Left vertical stroke -->
    <rect x="6" y="6" width="14" height="96" rx="5" fill="#2D6A4F"/>

    <!-- R: Bowl (upper arc) -->
    <path d="M20,6 L54,6 Q76,6 76,28 Q76,50 54,50 L20,50"
          fill="none" stroke="#2D6A4F" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Bowl inner cutout (cream) -->
    <path d="M25,17 L52,17 Q64,17 64,28 Q64,39 52,39 L25,39"
          fill="none" stroke="#F5F0E8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- R: Leg (diagonal from junction) -->
    <line x1="54" y1="50" x2="88" y2="102" stroke="#2D6A4F" stroke-width="14" stroke-linecap="round"/>

    <!-- Heart at bowl-leg junction (coral) -->
    <!-- Heart centered at (58, 52) -->
    <path d="M58,64
             C58,64 44,56 44,46
             C44,40 48,36 53,36
             C55,36 57,37 58,39
             C59,37 61,36 63,36
             C68,36 72,40 72,46
             C72,56 58,64 58,64 Z"
          fill="#E07A5F"/>

  </g>

  <!-- Thin divider -->
  <line x1="118" y1="18" x2="118" y2="112" stroke="#D8D8D8" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="134" y="62" font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="bold" fill="#2D2D2D" letter-spacing="-0.5">Recordare</text>
  <text x="135" y="84" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" fill="#2D6A4F" letter-spacing="5">레 코 다 레</text>
  <text x="135" y="104" font-family="Georgia, 'Times New Roman', serif"
        font-size="9.5" fill="#888888" font-style="italic" letter-spacing="0.5">당신의 삶, 단 하나의 기억으로</text>
</svg>
